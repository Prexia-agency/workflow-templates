name: Test Deploy
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      enforce-performance:
        type: boolean
        default: false
    secrets:
      VERCEL_TOKEN:
        required: false

permissions:
  contents: read
  deployments: read

jobs:
  e2e-accessibility:
    name: E2E & Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deployment-url: ${{ steps.wait_for_deployment.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Resolve workflow source
        id: workflow_source
        shell: bash
        run: |
          WORKFLOW_REF="${{ github.workflow_ref }}"
          echo "repository=${WORKFLOW_REF%%/.github/workflows/*}" >> "$GITHUB_OUTPUT"
          echo "ref=${WORKFLOW_REF##*@}" >> "$GITHUB_OUTPUT"

      - name: Checkout workflow templates
        uses: actions/checkout@v4.2.2
        with:
          repository: ${{ steps.workflow_source.outputs.repository }}
          ref: ${{ steps.workflow_source.outputs.ref }}
          path: .github/workflow-templates

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel deployment
        id: wait_for_deployment
        uses: ./.github/workflow-templates/.github/actions/wait-for-vercel
        with:
          environment: ${{ (inputs.environment == 'production' || inputs.environment == 'Production') && 'Production' || 'Preview' }}
          github-token: ${{ github.token }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}

      - name: Playwright E2E + WCAG tests
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.wait_for_deployment.outputs.url }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: e2e-results-${{ inputs.environment }}-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Resolve workflow source
        id: workflow_source
        shell: bash
        run: |
          WORKFLOW_REF="${{ github.workflow_ref }}"
          echo "repository=${WORKFLOW_REF%%/.github/workflows/*}" >> "$GITHUB_OUTPUT"
          echo "ref=${WORKFLOW_REF##*@}" >> "$GITHUB_OUTPUT"

      - name: Checkout workflow templates
        uses: actions/checkout@v4.2.2
        with:
          repository: ${{ steps.workflow_source.outputs.repository }}
          ref: ${{ steps.workflow_source.outputs.ref }}
          path: .github/workflow-templates

      - name: Wait for Vercel deployment
        id: wait_for_deployment
        uses: ./.github/workflow-templates/.github/actions/wait-for-vercel
        with:
          environment: ${{ (inputs.environment == 'production' || inputs.environment == 'Production') && 'Production' || 'Preview' }}
          github-token: ${{ github.token }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}

      - name: Wait for deployment and warm up
        timeout-minutes: 10
        run: |
          URL="${{ steps.wait_for_deployment.outputs.url }}"
          echo "Waiting for ${URL} and warming up..."

          for i in {1..48}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "${URL}" 2>/dev/null || echo "000")
            if [[ "${CODE}" =~ ^(200|301|302|304)$ ]]; then
              echo "✅ HTTP Ready (${CODE})"
              break
            fi
            echo "⏳ ${i}/48 - HTTP ${CODE}"
            sleep 10
          done

          echo "🔥 Warming up site..."
          for i in {1..3}; do
            curl -s "${URL}" > /dev/null
            sleep 5
          done

          echo "⏸️  Stabilization period..."
          sleep 30

          echo "✅ Site is Lighthouse-ready"

      - name: Install Chromium, Xvfb and Lighthouse
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            chromium-browser \
            chromium-chromedriver \
            fonts-liberation \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1
          npm install -g lighthouse@12.1.0

      - name: Run Lighthouse (headed Chrome with virtual display)
        id: lighthouse
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          sleep 3

          lighthouse "${{ steps.wait_for_deployment.outputs.url }}" \
          --output=json \
          --output=html \
          --output-path=./lighthouse-report \
          --preset=desktop \
          --chrome-path=/usr/bin/chromium-browser \
          --chrome-flags="--no-sandbox --disable-dev-shm-usage" \
          --quiet

          echo "✅ Lighthouse completed successfully"
        continue-on-error: ${{ !inputs.enforce-performance }}

      - name: Check Lighthouse scores
        if: always() && steps.lighthouse.outcome == 'success'
        run: |
          ACCESSIBILITY=$(jq '.categories.accessibility.score * 100' lighthouse-report.report.json)
          BEST_PRACTICES=$(jq '.categories["best-practices"].score * 100' lighthouse-report.report.json 2>/dev/null || echo "0")
          SEO=$(jq '.categories.seo.score * 100' lighthouse-report.report.json)

          echo "📊 Lighthouse Scores:"
          echo "  Accessibility: ${ACCESSIBILITY}%"
          echo "  Best Practices: ${BEST_PRACTICES}%"
          echo "  SEO: ${SEO}%"

          if [ "${{ inputs.enforce-performance }}" = "true" ]; then
            if (( $(echo "$ACCESSIBILITY < 90" | bc -l) )); then
              echo "❌ Accessibility score too low: ${ACCESSIBILITY}%"
              exit 1
            fi
            if (( $(echo "$SEO < 90" | bc -l) )); then
              echo "❌ SEO score too low: ${SEO}%"
              exit 1
            fi
          fi

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: lighthouse-results-${{ inputs.environment }}-${{ github.run_id }}
          path: |
            lighthouse-report.*
          retention-days: 30

      - name: Fail if performance enforcement enabled
        if: ${{ inputs.enforce-performance && steps.lighthouse.outcome == 'failure' }}
        run: |
          echo "❌ Lighthouse failed and enforce-performance is enabled"
          exit 1

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [e2e-accessibility, lighthouse]
    steps:
      - name: Generate Summary
        run: |
          echo "# 📊 Test Results: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ needs.e2e-accessibility.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| E2E + Accessibility | ${{ needs.e2e-accessibility.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse | ${{ needs.lighthouse.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.enforce-performance }}" = "true" ]; then
            echo "⚠️ **Performance enforcement:** ENABLED" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **Performance enforcement:** Informational only" >> $GITHUB_STEP_SUMMARY
          fi
