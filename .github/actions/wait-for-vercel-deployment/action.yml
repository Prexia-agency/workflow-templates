name: Wait for Vercel Deployment
description: >
  Polls the GitHub Deployments API until Vercel marks the target environment
  as successfully deployed, then outputs the preview/production URL.
  Uses the PR head SHA (not the synthetic merge commit SHA) so the lookup
  matches what Vercel actually registers.
  For Production environments, resolves the clean production alias via the
  Vercel API to avoid X-Robots-Tag: noindex on hash deployment URLs.

inputs:
  environment:
    description: 'Vercel environment label to wait for - "Preview" or "Production"'
    required: false
    default: 'Preview'
  github-token:
    description: 'GitHub token for Deployments API calls'
    required: true
  vercel-token:
    description: >
      Vercel API token. When provided and environment is Production, the action
      resolves the clean production alias instead of the hash deployment URL,
      preventing X-Robots-Tag: noindex from failing Lighthouse SEO audits.
    required: false
    default: ''

outputs:
  url:
    description: 'The resolved deployment URL — production alias when available, hash URL otherwise'
    value: ${{ steps.poll.outputs.url }}

runs:
  using: composite
  steps:
    - name: Poll for Vercel deployment
      id: poll
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      env:
        DEPLOY_ENV: ${{ inputs.environment }}
        VERCEL_TOKEN: ${{ inputs.vercel-token }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const environment = process.env.DEPLOY_ENV;
          const vercelToken = process.env.VERCEL_TOKEN;
          // In pull_request events context.sha is the synthetic merge commit SHA,
          // not the branch HEAD that Vercel actually registers its deployment against.
          // Fall back to context.sha for push-to-main (production) runs.
          const sha = context.payload.pull_request?.head?.sha ?? context.sha;
          const maxAttempts = 30; // 30 x 10 s = 5 min timeout
          const delayMs = 10_000;

          for (let attempt = 1; attempt <= maxAttempts; attempt++) {
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              environment,
              per_page: 5,
            });

            for (const deployment of deployments) {
              const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                per_page: 5,
              });

              // Statuses are newest-first; first success with a URL wins
              const success = statuses.find(s => s.state === 'success' && s.environment_url);
              if (!success) continue;

              const hashUrl = success.environment_url;

              // For Production, resolve the clean alias via Vercel API to avoid
              // X-Robots-Tag: noindex on hash deployment URLs (which tanks SEO audits).
              if (environment === 'Production' && vercelToken) {
                try {
                  const hostname = hashUrl.replace(/^https?:\/\//, '').replace(/\/$/, '');
                  const res = await fetch(
                    `https://api.vercel.com/v13/deployments?url=${encodeURIComponent(hostname)}`,
                    { headers: { Authorization: `Bearer ${vercelToken}` } },
                  );

                  if (res.ok) {
                    const json = await res.json();
                    const aliases = json.deployments?.[0]?.alias ?? [];

                    // Prefer custom domains; fall back to a clean .vercel.app alias.
                    // Both passes exclude the original hash URL.
                    const cleanAlias =
                      aliases.find(a => !a.includes(hostname) && !a.endsWith('.vercel.app')) ||
                      aliases.find(a => !a.includes(hostname));

                    if (cleanAlias) {
                      const resolvedUrl = cleanAlias.startsWith('http')
                        ? cleanAlias
                        : `https://${cleanAlias}`;
                      core.info(`Resolved production alias: ${resolvedUrl} (hash: ${hashUrl})`);
                      core.setOutput('url', resolvedUrl);
                      return;
                    }
                    core.warning(`No clean alias found; aliases: ${JSON.stringify(aliases)}. Falling back to hash URL.`);
                  } else {
                    core.warning(`Vercel API ${res.status}. Falling back to hash URL.`);
                  }
                } catch (err) {
                  core.warning(`Vercel alias resolution failed: ${err.message}. Falling back to hash URL.`);
                }
              }

              core.setOutput('url', hashUrl);
              core.info(`OK ${environment} deployment ready: ${hashUrl}`);
              return;
            }

            core.info(`Attempt ${attempt}/${maxAttempts}: ${environment} deployment not ready - waiting ${delayMs / 1000}s...`);
            await new Promise(r => setTimeout(r, delayMs));
          }

          core.setFailed(`Timed out waiting for Vercel ${environment} deployment after 5 minutes`);
